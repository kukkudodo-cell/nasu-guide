<style>
:root{
  --bg:#eef4fb; --card:#ffffff; --ink:#16273b; --sub:#5d7189; --line:#e2eaf3;
  --sky1:#3ea3f2; --sky2:#0c4a8e; --accent:#ff6a3d;
  --go:#22b06b; --warn:#f5a623; --no:#e8503a;
  --tabh:62px; --safeb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  overscroll-behavior:none; -webkit-text-size-adjust:100%;
}
.app{max-width:520px;margin:0 auto;min-height:100%;position:relative;}

/* Header */
.hdr{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(135deg,var(--sky1),var(--sky2));
  color:#fff;padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 12px;
  box-shadow:0 2px 12px rgba(11,74,142,.25);
}
.hdr-row{display:flex;align-items:center;gap:10px;}
.hdr h1{font-size:16.5px;margin:0;font-weight:800;letter-spacing:0;flex:1;line-height:1.2;}
.hdr h1 small{display:block;font-size:11px;font-weight:500;opacity:.85;letter-spacing:1px;margin-top:1px;}
.hpill{
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.5);
  color:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap;
}
.hpill b{font-size:15px;}

/* Views */
.view{display:none;padding:12px 12px calc(var(--tabh) + var(--safeb) + 20px);}
.view.on{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Chips */
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;background:var(--card);border:1.5px solid var(--line);color:var(--sub);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;
}
.chip.on{background:var(--sky2);border-color:var(--sky2);color:#fff;}

/* Cards */
.card{
  background:var(--card);border-radius:16px;padding:13px 14px;margin-bottom:11px;
  box-shadow:0 1px 3px rgba(22,39,59,.06),0 6px 18px rgba(22,39,59,.05);
}
.imgwrap{position:relative;width:calc(100% + 28px);margin:-13px -14px 11px;}
.imgwrap .cardimg{width:100%;margin:0;}
.cardimg{width:calc(100% + 28px);margin:-13px -14px 11px;height:auto;aspect-ratio:3/2;object-fit:cover;display:block;border-radius:16px 16px 0 0;background:#dde6ef;}
.card.ridden .cardimg{filter:saturate(.6);}
.statusdot{position:absolute;right:10px;bottom:10px;display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px 5px 9px;border-radius:999px;font-size:12.5px;font-weight:800;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.28);backdrop-filter:blur(2px);}
.statusdot i{width:11px;height:11px;border-radius:50%;background:#fff;display:inline-block;}
.sd-go{background:rgba(24,150,80,.92);} .sd-warn{background:rgba(200,130,10,.94);} .sd-no{background:rgba(200,50,35,.94);}
.sheetimg{width:calc(100% + 32px);margin:0 -16px 12px;height:auto;aspect-ratio:3/2;object-fit:cover;display:block;border-radius:14px;background:#dde6ef;}
.dishcap{font-size:12px;font-weight:800;color:var(--sub);margin:2px 0 6px;}
.dishrow{display:flex;gap:6px;margin-bottom:10px;}
.dishrow img{flex:1;width:0;aspect-ratio:3/2;object-fit:cover;border-radius:9px;background:#dde6ef;display:block;}
.arow{display:flex;align-items:flex-start;gap:10px;}
.anum{
  flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--sky2);color:#fff;
  font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.aname{font-size:16px;font-weight:800;line-height:1.3;flex:1;}
.aarea{font-size:11.5px;color:var(--sub);font-weight:700;margin-top:2px;}
.aprice{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap;}
.badge{
  display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 10px;
  font-size:12.5px;font-weight:800;margin-top:8px;
}
.b-go{background:#e2f7ec;color:#12894e;}
.b-warn{background:#fef1da;color:#b9770a;}
.b-no{background:#fde6e2;color:#c9341f;}
.b-closed{background:#3a4653;color:#fff;}
.card.closed .cardimg{filter:grayscale(.72) brightness(.86);}
.closeribbon{position:absolute;left:0;top:14px;background:#c9341f;color:#fff;font-size:12.5px;font-weight:800;
  padding:5px 12px 5px 10px;border-radius:0 8px 8px 0;box-shadow:0 2px 8px rgba(0,0,0,.32);z-index:2;letter-spacing:.5px;}
.sd-closed{background:rgba(58,70,83,.95);}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tag{font-size:11px;font-weight:700;color:var(--sub);background:#f1f5fa;border-radius:6px;padding:3px 7px;}
.tag.rain{background:#e8f1fd;color:#2f6fc4;}
.tag.baby{background:#fdeef4;color:#c05a86;}
.tag.dog{background:#f0efe0;color:#8a7b1e;}
.stars{color:var(--warn);font-size:13px;letter-spacing:1px;font-weight:800;}
.mapbtn{
  display:inline-flex;align-items:center;gap:6px;background:var(--sky2);color:#fff;
  border:none;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:800;cursor:pointer;
}
.btnrow{display:flex;gap:8px;margin-top:10px;align-items:stretch;}
.ridebtn{
  flex:0 0 auto;background:#fff;border:1.5px solid var(--go);color:var(--go);
  border-radius:10px;padding:8px 13px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;
}
.ridebtn.on{background:var(--go);color:#fff;border-color:var(--go);}
.ridtag{font-size:11px;font-weight:800;color:#fff;background:var(--go);border-radius:6px;padding:2px 7px;vertical-align:2px;}
.card.ridden{background:#f2fbf6;}
.card.ridden .anum{background:var(--go);}
.note{font-size:12px;color:var(--sub);margin-top:7px;line-height:1.5;}
.datebar{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#ff7b45,#e8503a);color:#fff;border-radius:12px;padding:9px 13px;font-size:13.5px;font-weight:800;margin-bottom:10px;box-shadow:0 3px 10px rgba(232,80,58,.25);}
.datebar b{font-size:15px;}
.prog{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#eef7f1;border:1.5px solid #cdebd9;border-radius:12px;padding:8px 12px;margin-bottom:10px;}
.prog .prog-txt{font-size:13.5px;font-weight:800;color:#12894e;}
.prog .rst{font-size:12px;font-weight:800;color:var(--sub);background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;}

/* Map */
#mapwrap{position:relative;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#cbe6ff,#eaf6ff);box-shadow:0 4px 20px rgba(22,39,59,.1);touch-action:none;}
#mapsvg{display:block;width:100%;height:auto;}
.zbtns{position:absolute;right:10px;bottom:12px;display:flex;flex-direction:column;gap:7px;z-index:5;}
.zbtn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.95);border:1px solid var(--line);
  font-size:22px;font-weight:800;color:var(--ink);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);cursor:pointer;}
.legend{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.94);border-radius:12px;padding:8px 10px;font-size:11px;font-weight:700;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.1);line-height:1.7;}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:5px;vertical-align:-1px;}
.pin{cursor:pointer;}
.pin .pdot{transition:.15s;}
.pin.dim{opacity:.22;}
.pin.hl .pring{opacity:1;}

/* Bottom sheet */
.sheet-bg{position:fixed;inset:0;background:rgba(15,30,50,.45);z-index:60;opacity:0;pointer-events:none;transition:.25s;}
.sheet-bg.on{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:520px;margin:0 auto;
  background:#fff;border-radius:22px 22px 0 0;padding:8px 16px calc(20px + var(--safeb));
  transform:translateY(102%);transition:transform .3s cubic-bezier(.3,.9,.3,1);max-height:82vh;overflow-y:auto;
}
.sheet.on{transform:none;}
.grab{width:42px;height:5px;border-radius:3px;background:#d7e0ea;margin:6px auto 12px;}
.sheet h2{font-size:20px;margin:0 0 3px;font-weight:800;}

/* Tabs */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:520px;margin:0 auto;
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;height:calc(var(--tabh) + var(--safeb));padding-bottom:var(--safeb);
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--sub);font-size:10.5px;font-weight:700;}
.tab .ic{font-size:21px;line-height:1;}
.tab.on{color:var(--sky2);}

/* Info */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px;}
.tbl th,.tbl td{border-bottom:1px solid var(--line);padding:9px 6px;text-align:center;}
.tbl th{color:var(--sub);font-size:12px;font-weight:800;}
.tbl td:first-child{text-align:left;font-weight:700;}
.tbl .p{color:var(--accent);font-weight:800;}
.sec-t{font-size:16px;font-weight:800;margin:20px 2px 8px;display:flex;align-items:center;gap:7px;}
.sec-t:first-child{margin-top:4px;}
.info-p{font-size:13.5px;line-height:1.7;color:var(--ink);margin:0 2px;}
.info-p b{color:var(--sky2);}
.step{display:flex;gap:11px;margin-bottom:2px;}
.step-n{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
.step-dot{width:26px;height:26px;border-radius:50%;background:var(--sky2);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;}
.step-line{width:2px;flex:1;background:var(--line);margin:2px 0;}
.step-b{padding-bottom:15px;flex:1;}
.step-b .t{font-size:15px;font-weight:800;}
.step-b .d{font-size:12.5px;color:var(--sub);margin-top:2px;line-height:1.5;}
.hero{border-radius:16px;padding:14px 15px;color:#fff;margin-bottom:12px;}
.hero h3{margin:0 0 4px;font-size:18px;font-weight:800;}
.hero p{margin:0;font-size:12.5px;opacity:.95;line-height:1.5;}
.kbd{background:#f1f5fa;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-weight:700;font-size:12px;}
</style>
</head>

var H=115;
function judge(a){
  if(a.price===0 && a.cat==="other") return {t:"info",label:"イベント"};
  if(a.minH && H < a.minH) return {t:"no",label:"のれない",why:"身長"+a.minH+"cm〜"};
  if(a.maxH && H > a.maxH) return {t:"no",label:"のれない",why:"身長"+a.maxH+"cmまで"};
  if(a.gUnder && H < a.gUnder) return {t:"warn",label:"付き添いで",why:"保護者同乗"};
  if((a.minH && H>=a.minH)) return {t:"go",label:"のれる",why:"身長"+a.minH+"cm〜クリア"};
  return {t:"go",label:"のれる",why:""};
}
function recommendStars(a){
  var s=1.5;
  if(a.pop) s+=1.6;
  if(a.tags.indexOf("new")>=0) s+=0.6;
  if(a.cat==="coaster"||a.cat==="thrill") s+=0.9;
  var j=judge(a);
  if(j.t==="go") s+=1.0; else if(j.t==="warn") s+=0.4;
  if(a.tags.indexOf("rain")>=0) s+=0.3;
  if(a.cat==="other") s=0;

}

/* pan/zoom */
var mapG=null,scale=1,tx=0,ty=0,VBW=1000,VBH=1052;
function apply(){if(mapG)mapG.setAttribute("transform","translate("+tx+","+ty+") scale("+scale+")");}
function resetView(){scale=1;tx=0;ty=0;apply();}
function clampScale(s){return Math.max(0.7,Math.min(4,s));}
function zoomAt(cx,cy,ns){ns=clampScale(ns);var wx=(cx-tx)/scale,wy=(cy-ty)/scale;scale=ns;tx=cx-wx*scale;ty=cy-wy*scale;apply();}
function svgPt(clientX,clientY){var r=svg.getBoundingClientRect();return{x:(clientX-r.left)/r.width*VBW,y:(clientY-r.top)/r.height*VBH};}
document.getElementById("zin").onclick=function(){zoomAt(500,526,scale*1.35);};
document.getElementById("zout").onclick=function(){zoomAt(500,526,scale/1.35);};
document.getElementById("zreset").onclick=resetView;
(function(){
  var lx=0,ly=0,pts={},pd=0;
  function nkeys(){return Object.keys(pts).length;}
  function purge(now){for(var id in pts){if(now-pts[id].t>3000)delete pts[id];}}
  svg.addEventListener("pointerdown",function(e){
    var now=Date.now();purge(now);
    try{svg.setPointerCapture(e.pointerId);}catch(_){}
    pts[e.pointerId]={sx:e.clientX,sy:e.clientY,x:e.clientX,y:e.clientY,moved:false,pinch:false,t:now};
    lx=e.clientX;ly=e.clientY;
    if(nkeys()>=2){for(var k in pts)pts[k].pinch=true;}
  });
  svg.addEventListener("pointermove",function(e){
    var rec=pts[e.pointerId];if(!rec)return;rec.x=e.clientX;rec.y=e.clientY;rec.t=Date.now();
    var ids=Object.keys(pts);
    if(ids.length>=2){
      for(var k in pts)pts[k].pinch=true;
      var a=pts[ids[0]],b=pts[ids[1]];var d=Math.hypot(a.x-b.x,a.y-b.y);
      var mid=svgPt((a.x+b.x)/2,(a.y+b.y)/2);
      if(pd)zoomAt(mid.x,mid.y,scale*(d/pd));pd=d;
    }else{
      if(Math.abs(e.clientX-rec.sx)+Math.abs(e.clientY-rec.sy)>7)rec.moved=true;
      var r=svg.getBoundingClientRect();
      tx+=(e.clientX-lx)/r.width*VBW;ty+=(e.clientY-ly)/r.height*VBH;lx=e.clientX;ly=e.clientY;apply();
    }
  });
  function up(e){
    var rec=pts[e.pointerId];var cx=e.clientX,cy=e.clientY;
    try{svg.releasePointerCapture(e.pointerId);}catch(_){}
    delete pts[e.pointerId];
    if(nkeys()<2)pd=0;
    if(rec&&!rec.moved&&!rec.pinch){
      var t=document.elementFromPoint(cx,cy);
      var pin=t&&t.closest?t.closest(".pin"):null;
      if(pin){
        if(pin.hasAttribute("data-n"))openAttr(+pin.getAttribute("data-n"));
        else if(pin.hasAttribute("data-rest")){var k=pin.getAttribute("data-rest");for(var i=0;i<REST.length;i++)if(REST[i].key===k){openRest(REST[i]);break;}}
      }
    }
  }
  svg.addEventListener("pointerup",up);svg.addEventListener("pointercancel",up);
  svg.addEventListener("wheel",function(e){e.preventDefault();var p=svgPt(e.clientX,e.clientY);zoomAt(p.x,p.y,scale*(e.deltaY<0?1.12:0.9));},{passive:false});
})();

  var pin=svg.querySelector('.pin[data-n="'+n+'"]');
  if(pin){pin.classList.add("hl");pin.classList.remove("dim");

      setTimeout(function(){ring.setAttribute("opacity","0");pin.classList.remove("hl");},2200);}}
}

  var j=judge(a);if(j.t==="info")return"";
  var cls=j.t==="go"?"b-go":j.t==="warn"?"b-warn":"b-no";
  var ic=j.t==="go"?"🟢":j.t==="warn"?"🟡":"🔴";
  return '<span class="badge '+cls+'">'+ic+' '+H+'cmで'+j.label+(j.why?'（'+j.why+'）':'')+'</span>';
}

/* ---------- ATTRACTION LIST ---------- */
var catFilter="all",onlyRideable=false,onlyNotRidden=false;
function renderAttr(){
  var wrap=document.getElementById("attrlist");wrap.innerHTML="";
  var list=ATTR.filter(function(a){return a.cat!=="other";});
  list=list.filter(function(a){
    if(catFilter!=="all"&&a.cat!==catFilter)return false;
    if(onlyRideable&&judge(a).t==="no")return false;
    if(onlyNotRidden&&RIDDEN.has(a.n))return false;
    return true;
  });
  list.sort(function(a,b){return (a.closed?1:0)-(b.closed?1:0)||recommendStars(b)-recommendStars(a)||a.n-b.n;});
  if(!list.length){wrap.innerHTML='<p class="note" style="text-align:center;padding:30px">条件に合うのりものがありません。</p>';return;}
  list.forEach(function(a){
    var st=recommendStars(a);var stars=st>0?'<span class="stars">'+"★".repeat(st)+"☆".repeat(5-st)+'</span>':"";
    var rid=RIDDEN.has(a.n);
    var j=judge(a);
    var sd=a.closed?'<span class="statusdot sd-closed"><i></i>運休</span>'
      :(j.t==="info"?"":'<span class="statusdot sd-'+j.t+'"><i></i>'+(j.t==="go"?"のれる":j.t==="warn"?"付き添い":"のれない")+'</span>');
    var ribbon=a.closed?'<span class="closeribbon">🚧 運休中</span>':"";
    var d=document.createElement("div");d.className="card"+(rid?" ridden":"")+(a.closed?" closed":"");
    d.innerHTML=
     '<div class="imgwrap"><img class="cardimg" src="img/a'+a.n+'.jpg" loading="lazy" alt="" onerror="imgFail(this)">'+ribbon+sd+'</div>'+
     '<div class="arow"><div class="anum">'+a.n+'</div>'+
     '<div style="flex:1"><div class="aname">'+a.name+(rid?' <span class="ridtag">✓のった</span>':'')+'</div>'+
     '<div class="aarea">'+areaName(a.area)+' ・ '+CAT[a.cat]+'</div></div>'+
     '<div style="text-align:right"><div class="aprice">'+priceTxt(a.price)+'</div>'+stars+'</div></div>'+
     (a.closed?'<span class="badge b-closed">🚧 '+a.closed+'</span>':'')+
     badgeHtml(a)+
     (a.note?'<div class="note">'+a.note+'</div>':'')+
     (a.age?'<div class="note">👪 '+a.age+'</div>':'')+
     '<div class="tags">'+tagChips(a)+'</div>'+
     '<div class="btnrow"><button class="mapbtn" data-map="'+a.n+'">📍 地図で見る</button>'+
     '<button class="ridebtn'+(rid?" on":"")+'" data-ride="'+a.n+'">'+(rid?"✓ のった":"のったにする")+'</button></div>';
    wrap.appendChild(d);
  });
  wrap.querySelectorAll("[data-map]").forEach(function(b){
    b.onclick=function(){go("map");setTimeout(function(){focusPin(+b.getAttribute("data-map"));},60);};
  });
  wrap.querySelectorAll("[data-ride]").forEach(function(b){
    b.onclick=function(){toggleRidden(+b.getAttribute("data-ride"));};
  });
}

function closeSheet(){sheet.classList.remove("on");sheetbg.classList.remove("on");}
sheetbg.onclick=closeSheet;
function openAttr(n){

   '<img class="sheetimg" src="img/a'+a.n+'.jpg" alt="" onerror="imgFail(this)">'+

   badgeHtml(a)+
   (a.note?'<div class="note">'+a.note+'</div>':'')+
   (a.age?'<div class="note">👪 '+a.age+'</div>':'')+
   '<div class="tags">'+tagChips(a)+'</div>'+

/* ---------- nav ---------- */
function go(v){
  document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});
  document.getElementById("v-"+v).classList.add("on");
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on",t.getAttribute("data-v")===v);});
  window.scrollTo(0,0);
}
document.querySelectorAll(".tab").forEach(function(t){t.onclick=function(){go(t.getAttribute("data-v"));};});

/* ---------- map chips ---------- */
function buildMapChips(){
  var defs=[["height","🟢 身長で乗れる"],["all","すべて"],["notridden","⬜ まだ乗ってない"],["coaster","🎢 コースター・絶叫"],["kids","👶 小さい子OK"],["rain","☔ 雨でもOK"]];
  var w=document.getElementById("mapchips");w.innerHTML="";
  defs.forEach(function(d){
    var c=document.createElement("div");c.className="chip"+(d[0]===mapFilter?" on":"");c.textContent=d[1];
    c.onclick=function(){mapFilter=d[0];buildMapChips();applyMapFilter();updateLegend();};
    w.appendChild(c);
  });
}
function updateLegend(){
  var l=document.getElementById("legend");
  if(mapFilter==="height"||mapFilter==="all"){
    l.innerHTML='<div><i style="background:#22b06b"></i>のれる</div><div><i style="background:#f5a623"></i>付き添いで</div><div><i style="background:#e8503a"></i>のれない</div><div><i style="background:#6b7684"></i>運休中</div>';
    l.style.display="block";
  }else{l.style.display="none";}
}

/* ---------- attr chips ---------- */
function buildAttrChips(){
  var cw=document.getElementById("attrcat");cw.innerHTML="";
  var cats=[["all","すべて"]].concat(Object.keys(CAT).filter(function(k){return k!=="other";}).map(function(k){return [k,CAT[k]];}));
  cats.forEach(function(d){
    var c=document.createElement("div");c.className="chip"+(d[0]===catFilter?" on":"");c.textContent=d[1];
    c.onclick=function(){catFilter=d[0];buildAttrChips();renderAttr();};cw.appendChild(c);
  });
  var fw=document.getElementById("attrfilt");fw.innerHTML="";
  var t=document.createElement("div");t.className="chip"+(onlyRideable?" on":"");t.textContent=(onlyRideable?"✓ ":"")+"👦 "+H+"cmで乗れるものだけ";
  t.onclick=function(){onlyRideable=!onlyRideable;buildAttrChips();renderAttr();};fw.appendChild(t);
  var t2=document.createElement("div");t2.className="chip"+(onlyNotRidden?" on":"");t2.textContent=(onlyNotRidden?"✓ ":"")+"⬜ まだ乗ってない";
  t2.onclick=function(){onlyNotRidden=!onlyNotRidden;buildAttrChips();renderAttr();};fw.appendChild(t2);
}
